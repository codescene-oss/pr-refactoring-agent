name: PR Refactoring Agent (Example)

# This is an example workflow showing how to trigger the refactoring agent
# from PR comments. Copy this to your repository and customize as needed.

on:
  issue_comment:
    types: [created]

jobs:
  refactor:
    # Only run on PR comments containing /refactor
    if: github.event.issue.pull_request != null && contains(github.event.comment.body, '/cs-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Get PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('same_repo', String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Run refactoring agent
        id: refactor
        uses: codescene-oss/pr-refactoring-agent
        with:
          command: 'skill:fix-code-health-degradations'
          model: 'anthropic/claude-sonnet-4-20250514'
          push: ${{ steps.pr.outputs.same_repo == 'true' }}
          codescene_token: ${{ secrets.CODESCENE_ACCESS_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.refactor.outcome }}';
            const body = outcome === 'success'
              ? '✅ Refactoring completed successfully! Changes have been pushed to this branch.'
              : '❌ Refactoring failed. Check the workflow logs for details.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
