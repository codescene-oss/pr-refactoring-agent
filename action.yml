name: 'CodeScene PR Refactoring Agent'
description: 'Automated code refactoring and code health improvements for pull requests'
branding:
  icon: 'code'
  color: 'orange'

inputs:
  pr_number:
    description: 'Pull request number (if running in PR context)'
    required: false
  command:
    description: 'The refactoring command to execute (e.g., "skill:fix-code-health-degradations")'
    required: true
  model:
    description: 'AI model to use (e.g., "anthropic/claude-sonnet-4-20250514")'
    required: true
  version:
    description: 'Version of refactoring-agent to use (defaults to latest)'
    required: false
    default: 'v0.0.1-beta17'
  github_token:
    description: 'GitHub token for API access and checkout'
    required: false
    default: ${{ github.token }}
  release_token:
    description: 'GitHub token for downloading releases (required only if refactoring-agent-releases repo is private)'
    required: false
  codescene_token:
    description: 'CodeScene API access token'
    required: true
  codescene_onprem_url:
    description: 'CodeScene On-prem URL (required for on-prem instances)'
    required: false
  anthropic_api_key:
    description: 'Anthropic API key (required for anthropic/* models)'
    required: false
  openai_api_key:
    description: 'OpenAI API key (required for openai/* models)'
    required: false
  google_api_key:
    description: 'Google API key (required for google/* models)'
    required: false
  opencode_auth_json:
    description: 'OpenCode auth JSON (required for github-copilot/* models)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Get PR metadata
      if: inputs.pr_number != ''
      id: pr
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const prNumber = parseInt('${{ inputs.pr_number }}');
          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          core.setOutput('head_ref', pr.head.ref);
          core.setOutput('head_repo', pr.head.repo.full_name);
          core.setOutput('same_repo', String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));
          core.setOutput('base_ref', pr.base.ref);

    - name: Create initial PR comment
      if: inputs.pr_number != ''
      id: initial_comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const { data: comment } = await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: parseInt('${{ inputs.pr_number }}'),
            body: '## <img src="https://github.com/codescene-oss.png" width="15" height="15"> CodeScene Refactoring Agent\n\n⏳ Running...\n\n---\nStarted at ' + new Date().toUTCString(),
          });
          core.setOutput('comment_id', String(comment.id));

    - name: Backup action directory
      if: inputs.pr_number != ''
      shell: bash
      run: |
        # actions/checkout wipes the workspace root when initialising a new
        # .git there.  Preserve the checked-out action directory so later
        # composite steps (which reference ./.pr-refactoring-agent) keep working.
        if [ -d ".pr-refactoring-agent" ]; then
          cp -a .pr-refactoring-agent "$RUNNER_TEMP/_pr-refactoring-agent-backup"
        fi

    - name: Checkout PR branch
      if: inputs.pr_number != ''
      uses: actions/checkout@v5
      with:
        repository: ${{ steps.pr.outputs.head_repo }}
        ref: ${{ steps.pr.outputs.head_ref }}
        token: ${{ inputs.github_token }}
        fetch-depth: 0

    - name: Restore action directory
      if: inputs.pr_number != ''
      shell: bash
      run: |
        if [ -d "$RUNNER_TEMP/_pr-refactoring-agent-backup" ]; then
          rm -rf .pr-refactoring-agent
          mv "$RUNNER_TEMP/_pr-refactoring-agent-backup" .pr-refactoring-agent
        fi

    - name: Configure git
      if: inputs.pr_number != ''
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout ${{ steps.pr.outputs.head_ref }}
        echo "Current branch: $(git branch --show-current)"
        echo "Current commit: $(git rev-parse HEAD)"

    - name: Determine platform
      id: platform
      shell: bash
      run: |
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64|amd64)
            echo "binary_name=refactoring-agent-linux-amd64" >> "$GITHUB_OUTPUT"
            ;;
          aarch64|arm64)
            echo "binary_name=refactoring-agent-linux-aarch64" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "::error::Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac

    - name: Download refactoring-agent binary
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        BINARY_NAME: ${{ steps.platform.outputs.binary_name }}
        GH_TOKEN: ${{ inputs.release_token }}
      run: |
        set -euo pipefail

        REPO="codescene-oss/refactoring-agent-releases"
        ASSET_NAME="${BINARY_NAME}.zip"

        mkdir -p "${RUNNER_TEMP}/refactoring-agent"
        cd "${RUNNER_TEMP}/refactoring-agent"

        # TODO: Remove the API method branch below when refactoring-agent-releases becomes public
        if [ -n "${GH_TOKEN}" ]; then
          # Token provided - use API method (for private repos)
          echo "Using API method to download binary..."

          # Get the release
          if [ "$VERSION" = "latest" ]; then
            RELEASE_DATA=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/releases/latest")
          else
            RELEASE_DATA=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${REPO}/releases/tags/${VERSION}")
          fi

          RELEASE_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
          echo "Release tag: $RELEASE_TAG"

          # Find the asset ID
          ASSET_ID=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name == \"${ASSET_NAME}\") | .id")

          if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
            echo "::error::Could not find ${ASSET_NAME} in release ${RELEASE_TAG}"
            echo "Available assets:"
            echo "$RELEASE_DATA" | jq -r '.assets[].name'
            exit 1
          fi

          echo "Downloading ${ASSET_NAME} (asset ID: ${ASSET_ID})..."

          # Download via API
          if ! curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            -o "${BINARY_NAME}.zip" \
            "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}"; then
            echo "::error::Failed to download binary"
            exit 1
          fi

          echo "✅ Successfully downloaded ${ASSET_NAME}"
        else
          # No token - use direct download (public repos only)
          if [ "$VERSION" = "latest" ]; then
            DOWNLOAD_URL="https://github.com/${REPO}/releases/latest/download/${ASSET_NAME}"
          else
            DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION}/${ASSET_NAME}"
          fi

          echo "Using direct download from ${DOWNLOAD_URL}..."

          if ! curl -fsSL -o "${BINARY_NAME}.zip" "$DOWNLOAD_URL"; then
            echo "::error::Failed to download binary from ${DOWNLOAD_URL}"
            echo "If the releases repo is private, you must provide a release_token"
            exit 1
          fi

          echo "✅ Successfully downloaded ${ASSET_NAME}"
        fi

        unzip -q "${BINARY_NAME}.zip"

        if [ -f "refactoring-agent" ]; then
          chmod +x refactoring-agent
        elif [ -f "$BINARY_NAME" ]; then
          mv "$BINARY_NAME" refactoring-agent
          chmod +x refactoring-agent
        else
          echo "::error::Could not find binary in archive"
          ls -la
          exit 1
        fi

        echo "${RUNNER_TEMP}/refactoring-agent" >> "$GITHUB_PATH"

    - name: Build agent config
      id: agent_config
      shell: bash
      env:
        CS_ACCESS_TOKEN: ${{ inputs.codescene_token }}
        CS_ONPREM_URL: ${{ inputs.codescene_onprem_url }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr_number }}
        PR_COMMENT_ID: ${{ steps.initial_comment.outputs.comment_id }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        GOOGLE_API_KEY: ${{ inputs.google_api_key }}
        OPENCODE_AUTH_JSON: ${{ inputs.opencode_auth_json }}
      run: |
        set -euo pipefail

        # Build CS_AGENT_CONFIG JSON using jq
        CONFIG=$(jq -n \
          --arg token "$CS_ACCESS_TOKEN" \
          --arg onprem "${CS_ONPREM_URL:-}" \
          --arg gh_token "$GITHUB_TOKEN" \
          --arg gh_repo "$GITHUB_REPOSITORY" \
          --arg pr_num "${PR_NUMBER:-}" \
          --arg comment_id "${PR_COMMENT_ID:-}" \
          --arg anthropic_key "$(printf '%s' "${ANTHROPIC_API_KEY:-}" | tr -d '\n')" \
          --arg openai_key "$(printf '%s' "${OPENAI_API_KEY:-}" | tr -d '\n')" \
          --arg google_key "$(printf '%s' "${GOOGLE_API_KEY:-}" | tr -d '\n')" \
          --arg opencode_auth "$(printf '%s' "${OPENCODE_AUTH_JSON:-}" | tr -d '\n')" \
          '{
            codescene_access_token: $token,
            print_logs: true,
            tracking: {
              environment: "github-action"
            },
            provider: ({}
              + (if $anthropic_key != "" then { anthropic_api_key: $anthropic_key } else {} end)
              + (if $openai_key != "" then { openai_api_key: $openai_key } else {} end)
              + (if $google_key != "" then { google_api_key: $google_key } else {} end)
              + (if $opencode_auth != "" then { opencode_auth_json: $opencode_auth } else {} end))
          }
          + (if $onprem != "" then { codescene_onprem_url: $onprem } else {} end)
          + (if $pr_num != "" then {
              ci: {
                github: ({
                  token: $gh_token,
                  repository: $gh_repo,
                  pr_number: $pr_num
                } + (if $comment_id != "" then { pr_comment_id: $comment_id } else {} end))
              }
            } else {} end)')

        # Mask the config value in logs (it contains tokens)
        echo "::add-mask::${CONFIG}"

        # Use a delimiter to safely pass multi-line JSON
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "json<<${EOF}" >> "$GITHUB_OUTPUT"
        echo "$CONFIG" >> "$GITHUB_OUTPUT"
        echo "${EOF}" >> "$GITHUB_OUTPUT"

    - name: Run refactoring agent
      id: refactor
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
        PR_NUMBER: ${{ inputs.pr_number }}
        MODEL: ${{ inputs.model }}
        CS_AGENT_CONFIG: ${{ steps.agent_config.outputs.json }}
      run: |
        set -euo pipefail

        BINARY="${RUNNER_TEMP}/refactoring-agent/refactoring-agent"

        # Prepend github-pr-comment skill if running in PR context
        if [ -n "${PR_NUMBER}" ]; then
          # Strip any command prefix starting with / (e.g., /cs-agent, /refactor, etc.)
          echo "COMMAND: ${COMMAND}"
          STRIPPED_COMMAND=$(echo "$COMMAND" | sed 's|^/[^ ]\+ \+||')
          echo "STRIPPED_COMMAND: ${STRIPPED_COMMAND}"
          FULL_COMMAND="skill:github-pr-comment ${STRIPPED_COMMAND}"
        else
          FULL_COMMAND="${COMMAND}"
        fi

        ARGS=("run" "$FULL_COMMAND" "--model" "$MODEL" "--push")

        echo "Running: $BINARY ${ARGS[*]}"
        "$BINARY" "${ARGS[@]}"
